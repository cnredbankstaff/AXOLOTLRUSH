<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axolotl Escape</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      overflow: hidden;
    }

    .game-container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .game-canvas {
      flex: 1;
      position: relative;
      background: linear-gradient(180deg, #0a4d7a 0%, #051f2e 100%);
      overflow: hidden;
      border: 3px solid #00d4ff;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3) inset;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ui-top {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      z-index: 100;
    }

    .level-info {
      background: rgba(0, 20, 40, 0.8);
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #00d4ff;
      color: #00ff88;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    .minimap {
      width: 120px;
      height: 120px;
      background: rgba(0, 20, 40, 0.9);
      border: 2px solid #00d4ff;
      border-radius: 8px;
      position: relative;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    .minimap-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .abilities-ui {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .ability-icon {
      width: 60px;
      height: 60px;
      background: rgba(0, 20, 40, 0.8);
      border: 2px solid #00d4ff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00ff88;
      font-weight: bold;
      font-size: 12px;
      text-align: center;
      position: relative;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }

    .ability-icon.locked {
      opacity: 0.4;
      color: #666;
    }

    .ability-icon.active {
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
      border-color: #00ff88;
    }

    .cooldown-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: #00ff88;
      width: 100%;
      border-radius: 0 0 6px 6px;
    }

    .interaction-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 20, 40, 0.95);
      padding: 20px 30px;
      border-radius: 8px;
      border: 2px solid #ffaa00;
      color: #ffaa00;
      font-weight: bold;
      text-align: center;
      z-index: 50;
      pointer-events: auto;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      text-align: center;
      color: #00ff88;
      font-weight: bold;
    }

    .modal-content {
      max-width: 600px;
      padding: 40px;
      background: rgba(0, 20, 40, 0.95);
      border: 3px solid #00d4ff;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    .modal-title {
      font-size: 32px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
    }

    .modal-text {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
      color: #00d4ff;
    }

    .modal-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 30px;
    }

    .modal-button {
      padding: 12px 30px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
      pointer-events: auto;
    }

    .modal-button:hover {
      background: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
      transform: scale(1.05);
    }

    .modal-button.secondary {
      background: #00d4ff;
      color: #000;
    }

    .timer {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 20, 40, 0.8);
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #ffaa00;
      color: #ffaa00;
      font-weight: bold;
      font-size: 18px;
      z-index: 100;
    }

    .hidden {
      display: none !important;
    }

    .particle {
      position: absolute;
      pointer-events: none;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="game-container">
   <div class="game-canvas" id="gameCanvas">
    <canvas id="mainCanvas"></canvas>
    <div class="ui-overlay">
     <div class="ui-top">
      <div class="level-info" id="levelInfo">
       Level 1: Enchanted Pond
      </div>
      <div class="minimap">
       <canvas id="minimapCanvas" class="minimap-canvas"></canvas>
      </div>
     </div>
     <div class="timer hidden" id="timer">
      00:00
     </div>
     <div class="abilities-ui" id="abilitiesUI"></div>
     <div id="interactionPrompt" class="interaction-prompt hidden"></div>
    </div>
   </div>
  </div>
  <script>
    // ============================================
    // GAME ENGINE - Axolotl Escape
    // ============================================

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const minimapCanvas = document.getElementById('minimapCanvas');
    const minimapCtx = minimapCanvas.getContext('2d');

    let gameWidth, gameHeight;
    let currentLevel = 0;
    let gameState = 'playing'; // 'playing', 'levelComplete', 'gameWon', 'intro'
    let startTime = 0;
    let speedrunTimer = 0;

    function resizeCanvas() {
      const container = document.getElementById('gameCanvas');
      gameWidth = container.clientWidth;
      gameHeight = container.clientHeight;
      canvas.width = gameWidth;
      canvas.height = gameHeight;
      minimapCanvas.width = 120;
      minimapCanvas.height = 120;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================
    // PLAYER
    // ============================================

    const player = {
      x: 100,
      y: 100,
      width: 18,
      height: 18,
      vx: 0,
      vy: 0,
      speed: 3,
      maxSpeed: 3,
      friction: 0.92,
      dashCooldown: 0,
      dashDuration: 0,
      dashSpeed: 8,
      glowRadius: 0,
      abilities: {
        dash: false,
        glow: false,
        stunEnemy: false
      },
      canInteract: false,
      interactTarget: null,

      update() {
        // Apply friction
        this.vx *= this.friction;
        this.vy *= this.friction;

        // Clamp velocity
        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > this.maxSpeed) {
          this.vx = (this.vx / speed) * this.maxSpeed;
          this.vy = (this.vy / speed) * this.maxSpeed;
        }

        // Update position
        this.x += this.vx;
        this.y += this.vy;

        // Boundary check
        this.x = Math.max(0, Math.min(gameWidth - this.width, this.x));
        this.y = Math.max(0, Math.min(gameHeight - this.height, this.y));

        // Update cooldowns
        if (this.dashCooldown > 0) this.dashCooldown--;
        if (this.dashDuration > 0) this.dashDuration--;

        // Update glow
        if (this.abilities.glow && currentLevel >= 2) {
          this.glowRadius = Math.sin(performance.now() / 200) * 30 + 100;
        } else {
          this.glowRadius = 0;
        }

        // Check collision with walls
        this.checkWallCollisions();
      },

      checkWallCollisions() {
        const level = levels[currentLevel];
        for (let wall of level.walls) {
          if (this.x + this.width > wall.x &&
              this.x < wall.x + wall.width &&
              this.y + this.height > wall.y &&
              this.y < wall.y + wall.height) {
            // Push player out
            const overlapLeft = (this.x + this.width) - wall.x;
            const overlapRight = (wall.x + wall.width) - this.x;
            const overlapTop = (this.y + this.height) - wall.y;
            const overlapBottom = (wall.y + wall.height) - this.y;

            const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapLeft) {
              this.x = wall.x - this.width;
            } else if (minOverlap === overlapRight) {
              this.x = wall.x + wall.width;
            } else if (minOverlap === overlapTop) {
              this.y = wall.y - this.height;
            } else {
              this.y = wall.y + wall.height;
            }
          }
        }
      },

      draw(ctx) {
        const centerX = this.x + this.width / 2;
        const centerY = this.y + this.height / 2;

        // Glow effect
        if (this.glowRadius > 0) {
          ctx.fillStyle = `rgba(0, 255, 136, 0.1)`;
          ctx.beginPath();
          ctx.arc(centerX, centerY, this.glowRadius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Kawaii axolotl - proper anatomy
        // Long body (like actual axolotl)
        ctx.fillStyle = '#ff99b3';
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 2, 13, 11, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head with smile (rounded axolotl head)
        ctx.fillStyle = '#ffb3cc';
        ctx.beginPath();
        ctx.ellipse(centerX + 1, centerY - 10, 10, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        // Sweet smile
        ctx.strokeStyle = '#ff6b9d';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(centerX + 1, centerY - 6, 4, 0, Math.PI);
        ctx.stroke();

        // Big cute eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(centerX - 3, centerY - 12, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX + 7, centerY - 12, 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Eye pupils with shine
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(centerX - 3, centerY - 11, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX + 7, centerY - 11, 2, 0, Math.PI * 2);
        ctx.fill();

        // Shine in eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(centerX - 2, centerY - 12, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX + 8, centerY - 12, 0.8, 0, Math.PI * 2);
        ctx.fill();

        // Head gills - two sections on each side (shorter and stubby)
        ctx.strokeStyle = '#ff99b3';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        // Left side gills (top section - 2 short gills)
        for (let i = 0; i < 2; i++) {
          const xOffset = centerX - 7 + i * 5;
          ctx.beginPath();
          ctx.moveTo(xOffset, centerY - 20);
          ctx.quadraticCurveTo(xOffset - 3, centerY - 26, xOffset - 1, centerY - 29);
          ctx.stroke();
        }
        
        // Left side gills (bottom section - 2 short gills)
        for (let i = 0; i < 2; i++) {
          const xOffset = centerX - 7 + i * 5;
          ctx.beginPath();
          ctx.moveTo(xOffset, centerY - 10);
          ctx.quadraticCurveTo(xOffset - 3, centerY - 16, xOffset - 1, centerY - 19);
          ctx.stroke();
        }
        
        // Right side gills (top section - 2 short gills)
        for (let i = 0; i < 2; i++) {
          const xOffset = centerX + 7 - i * 5;
          ctx.beginPath();
          ctx.moveTo(xOffset, centerY - 20);
          ctx.quadraticCurveTo(xOffset + 3, centerY - 26, xOffset + 1, centerY - 29);
          ctx.stroke();
        }
        
        // Right side gills (bottom section - 2 short gills)
        for (let i = 0; i < 2; i++) {
          const xOffset = centerX + 7 - i * 5;
          ctx.beginPath();
          ctx.moveTo(xOffset, centerY - 10);
          ctx.quadraticCurveTo(xOffset + 3, centerY - 16, xOffset + 1, centerY - 19);
          ctx.stroke();
        }

        // Front legs (stubby cute axolotl legs)
        ctx.fillStyle = '#ffb3cc';
        ctx.beginPath();
        ctx.ellipse(centerX - 7, centerY + 10, 2.5, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(centerX + 7, centerY + 10, 2.5, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Back legs (tiny)
        ctx.beginPath();
        ctx.ellipse(centerX - 9, centerY + 8, 2, 3.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(centerX + 9, centerY + 8, 2, 3.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Long flowing tail (like real axolotl)
        ctx.strokeStyle = '#ff99b3';
        ctx.lineWidth = 3.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(centerX + 11, centerY + 3);
        ctx.quadraticCurveTo(centerX + 20, centerY + 1, centerX + 22, centerY - 8);
        ctx.stroke();

        // Tail fin detail (feathery)
        ctx.strokeStyle = '#ffb3cc';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(centerX + 16 + i * 2, centerY - 2 - i);
          ctx.lineTo(centerX + 18 + i * 2, centerY - 6 - i);
          ctx.stroke();
        }

        // Wand in hand (always held)
        ctx.save();
        ctx.translate(centerX + 11, centerY - 3);
        ctx.rotate(-0.1);
        
        // Wand stick
        ctx.strokeStyle = '#8b6f47';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(14, 9);
        ctx.stroke();

        // Wand star (glowing)
        ctx.fillStyle = '#ffdd00';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const x = Math.cos(angle) * 7;
          const y = Math.sin(angle) * 7;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // Wand glow
        ctx.fillStyle = 'rgba(255, 221, 0, 0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // Dash effect
        if (this.dashDuration > 0) {
          ctx.strokeStyle = `rgba(0, 255, 136, ${this.dashDuration / 10})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    };

    // ============================================
    // MINION ENEMIES
    // ============================================

    const minions = [];

    function createMinion(x, y) {
      minions.push({
        x,
        y,
        spawnX: gameWidth / 2,
        spawnY: gameHeight / 2,
        width: 12,
        height: 12,
        vx: 0,
        vy: 0,
        speed: 0.9,
        sensorRange: 140,
        patrolSpeed: 0.5,
        patrolX: Math.random() * gameWidth,
        patrolY: Math.random() * gameHeight,
        patrolTimer: 0,
        patrolChangeInterval: 200,
        detectedPlayer: false,

        isPlayerSpawnZone(checkX, checkY) {
          const level = levels[currentLevel];
          const spawnPoint = level.playerStart;
          const spawnRadius = 80;
          const dx = checkX - spawnPoint.x;
          const dy = checkY - spawnPoint.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          return dist < spawnRadius;
        },

        update() {
          const dx = player.x - this.x;
          const dy = player.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          this.detectedPlayer = dist < this.sensorRange;

          if (this.detectedPlayer) {
            // Chase player when detected
            if (dist > 5) {
              const dirX = dx / dist;
              const dirY = dy / dist;
              this.vx = dirX * this.speed;
              this.vy = dirY * this.speed;
            } else {
              this.vx = 0;
              this.vy = 0;
            }
          } else {
            // Patrol when player not detected
            this.patrolTimer--;
            if (this.patrolTimer <= 0) {
              this.patrolX = Math.random() * gameWidth;
              this.patrolY = Math.random() * gameHeight;
              this.patrolTimer = this.patrolChangeInterval;
            }

            const pdx = this.patrolX - this.x;
            const pdy = this.patrolY - this.y;
            const pdist = Math.sqrt(pdx * pdx + pdy * pdy);

            if (pdist > 10) {
              this.vx = (pdx / pdist) * this.patrolSpeed;
              this.vy = (pdy / pdist) * this.patrolSpeed;
            } else {
              this.vx *= 0.9;
              this.vy *= 0.9;
            }
          }

          const oldX = this.x;
          const oldY = this.y;
          this.x += this.vx;
          this.y += this.vy;

          // HARD BOUNDARIES - stay on screen
          this.x = Math.max(0, Math.min(gameWidth - this.width, this.x));
          this.y = Math.max(0, Math.min(gameHeight - this.height, this.y));

          // Wall collision - push out smoothly
          const level = levels[currentLevel];
          for (let wall of level.walls) {
            if (this.x + this.width > wall.x &&
                this.x < wall.x + wall.width &&
                this.y + this.height > wall.y &&
                this.y < wall.y + wall.height) {
              // Calculate overlap on each side
              const overlapLeft = (this.x + this.width) - wall.x;
              const overlapRight = (wall.x + wall.width) - this.x;
              const overlapTop = (this.y + this.height) - wall.y;
              const overlapBottom = (wall.y + wall.height) - this.y;

              // Push out from the smallest overlap
              const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
              
              if (minOverlap === overlapLeft) {
                this.x = wall.x - this.width;
              } else if (minOverlap === overlapRight) {
                this.x = wall.x + wall.width;
              } else if (minOverlap === overlapTop) {
                this.y = wall.y - this.height;
              } else {
                this.y = wall.y + wall.height;
              }
              
              this.vx = 0;
              this.vy = 0;
              break;
            }
          }

          // Check collision with player
          if (this.x < player.x + player.width &&
              this.x + this.width > player.x &&
              this.y < player.y + player.height &&
              this.y + this.height > player.y) {
            respawnPlayer();
            // Respawn minion to center
            this.x = this.spawnX;
            this.y = this.spawnY;
            this.vx = 0;
            this.vy = 0;
          }
        },

        draw(ctx) {
          const centerX = this.x + this.width / 2;
          const centerY = this.y + this.height / 2;

          // Sensor zone (faint circle showing detection range)
          ctx.strokeStyle = this.detectedPlayer ? 'rgba(255, 100, 100, 0.25)' : 'rgba(100, 150, 255, 0.15)';
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.arc(centerX, centerY, this.sensorRange, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);

          // Minion aura
          ctx.fillStyle = 'rgba(150, 30, 80, 0.3)';
          ctx.beginPath();
          ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
          ctx.fill();

          // Body
          ctx.fillStyle = '#d64880';
          ctx.beginPath();
          ctx.ellipse(centerX, centerY + 0.5, 7, 7, 0, 0, Math.PI * 2);
          ctx.fill();

          // Red outline
          ctx.strokeStyle = '#ff4488';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(centerX, centerY + 0.5, 7, 7, 0, 0, Math.PI * 2);
          ctx.stroke();

          // Head
          ctx.fillStyle = '#ff6b9d';
          ctx.beginPath();
          ctx.ellipse(centerX + 1, centerY - 5, 6, 7, 0, 0, Math.PI * 2);
          ctx.fill();

          // Eyes
          ctx.fillStyle = '#ff00ff';
          ctx.beginPath();
          ctx.arc(centerX - 1, centerY - 7, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(centerX + 3, centerY - 7, 1.5, 0, Math.PI * 2);
          ctx.fill();

          // Head gills (2 sections on each side - tiny)
          ctx.strokeStyle = '#d64880';
          ctx.lineWidth = 1;
          ctx.lineCap = 'round';
          
          for (let i = 0; i < 2; i++) {
            const xOffset = centerX - 1.5 + i * 2;
            ctx.beginPath();
            ctx.moveTo(xOffset, centerY - 12);
            ctx.quadraticCurveTo(xOffset - 1, centerY - 15, xOffset - 0.5, centerY - 17);
            ctx.stroke();
          }
          
          for (let i = 0; i < 2; i++) {
            const xOffset = centerX + 1.5 - i * 2;
            ctx.beginPath();
            ctx.moveTo(xOffset, centerY - 12);
            ctx.quadraticCurveTo(xOffset + 1, centerY - 15, xOffset + 0.5, centerY - 17);
            ctx.stroke();
          }

          // Tiny tail
          ctx.strokeStyle = '#ff6b9d';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(centerX + 7, centerY);
          ctx.quadraticCurveTo(centerX + 11, centerY - 1, centerX + 12, centerY - 2);
          ctx.stroke();
        }
      });
    }

    function spawnMinions(count, centerX, centerY) {
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const x = centerX + Math.cos(angle) * 100;
        const y = centerY + Math.sin(angle) * 100;
        createMinion(x, y);
      }

      vx: 0,

      speed: 1.0,
      sensorRange: 180,
      patrolSpeed: 0.4,
      patrolX: 500,
      patrolY: 300,
      patrolTimer: 0,
      patrolChangeInterval: 250,
      stunned: false,
      stunnedDuration: 0,
      detectedPlayer: false,

      isPlayerSpawnZone(checkX, checkY) {
        const level = levels[currentLevel];
        const spawnPoint = level.playerStart;
        const spawnRadius = 80;
        const dx = checkX - spawnPoint.x;
        const dy = checkY - spawnPoint.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < spawnRadius;
      },

      update() {
        if (this.stunned) {
          this.stunnedDuration--;
          if (this.stunnedDuration <= 0) {
            this.stunned = false;
          }
          return;
        }

        // Ensure patrol target exists
        if (this.patrolX === undefined || this.patrolY === undefined) {
          let attempts = 0;
          do {
            this.patrolX = Math.random() * gameWidth;
            this.patrolY = Math.random() * gameHeight;
            attempts++;
          } while (this.isPlayerSpawnZone(this.patrolX, this.patrolY) && attempts < 5);
        }

        // SENSOR: Detect player proximity
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        this.detectedPlayer = dist < this.sensorRange;

        if (this.detectedPlayer) {
          // Chase player when detected
          if (dist > 5) {
            this.vx += (dx / dist) * this.speed * 1.2;
            this.vy += (dy / dist) * this.speed * 1.2;
          } else {
            this.vx *= 0.9;
            this.vy *= 0.9;
          }
        } else {
          // Patrol when player not detected
          this.patrolTimer--;
          if (this.patrolTimer <= 0) {
            this.patrolX = Math.random() * gameWidth;
            this.patrolY = Math.random() * gameHeight;
            this.patrolTimer = this.patrolChangeInterval;
          }

          const pdx = this.patrolX - this.x;
          const pdy = this.patrolY - this.y;
          const pdist = Math.sqrt(pdx * pdx + pdy * pdy);

          if (pdist > 10) {
            this.vx += (pdx / pdist) * this.patrolSpeed * 0.5;
            this.vy += (pdy / pdist) * this.patrolSpeed * 0.5;
          }
        }

        // Apply friction and cap speed
        this.vx *= 0.85;
        this.vy *= 0.85;

        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > this.speed * 1.5) {
          this.vx = (this.vx / speed) * this.speed * 1.5;
          this.vy = (this.vy / speed) * this.speed * 1.5;
        }

        const oldX = this.x;
        const oldY = this.y;
        this.x += this.vx;
        this.y += this.vy;

        // HARD BOUNDARIES
        this.x = Math.max(0, Math.min(gameWidth - this.width, this.x));
        this.y = Math.max(0, Math.min(gameHeight - this.height, this.y));

        // Wall collision - push out smoothly
        const level = levels[currentLevel];
        for (let wall of level.walls) {
          if (this.x + this.width > wall.x &&
              this.x < wall.x + wall.width &&
              this.y + this.height > wall.y &&
              this.y < wall.y + wall.height) {
            // Push back to old position
            this.x = oldX;
            this.y = oldY;
            this.vx = 0;
            this.vy = 0;
            break;
          }
        }

        // Check collision with player
        if (this.x < player.x + player.width &&
            this.x + this.width > player.x &&
            this.y < player.y + player.height &&
            this.y + this.height > player.y) {
          respawnPlayer();
          // Respawn evil axolotl to center
          this.x = this.spawnX;
          this.y = this.spawnY;
          this.vx = 0;
          this.vy = 0;
          this.patrolTimer = 0;
        }

    function createEasyMazeWalls(w, h) {
      const walls = [
        { x: 50, y: 50, width: w - 100, height: 15 },
        { x: 50, y: h - 65, width: w - 100, height: 15 },
        { x: 50, y: 50, width: 15, height: h - 100 },
        { x: w - 65, y: 50, width: 15, height: h - 100 }
      ];

      // Grid-based maze for easy level (wider corridors, thinner walls)
      const cellSize = 70;
      for (let x = 150; x < w - 100; x += cellSize) {
        for (let y = 150; y < h - 100; y += cellSize) {
          if (Math.random() > 0.30) {
            const isHorizontal = Math.random() > 0.5;
            walls.push({
              x: x,
              y: y,
              width: isHorizontal ? cellSize : 18,
              height: isHorizontal ? 18 : cellSize
            });
          }
        }
      }
      return walls;
    }

    const movingObstacles = [];

    function createMovingObstacles() {
      movingObstacles.length = 0;
      const level = levels[currentLevel];
      
      if (!level.bossLevel) return;

      // Create large pond objects (lily pad, logs, rocks, etc.)
      const obstacleTypes = [
        { type: 'lilypad', size: 50 },
        { type: 'log', size: 60 },
        { type: 'rock', size: 45 },
        { type: 'driftwood', size: 55 }
      ];

      for (let i = 0; i < 6; i++) {
        const obstacle = obstacleTypes[i % obstacleTypes.length];
        movingObstacles.push({
          ...obstacle,
          x: Math.random() * (gameWidth - 200) + 100,
          y: Math.random() * (gameHeight - 200) + 100,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          speed: 0.5 + (currentLevel * 0.15), // Increases with level progression
          rotation: 0,
          rotationSpeed: (Math.random() - 0.5) * 0.05
        });
      }
    }

    function updateMovingObstacles() {
      const level = levels[currentLevel];
      if (!level.bossLevel) return;

      movingObstacles.forEach(obstacle => {
        // Update speed based on level progression
        obstacle.speed = 0.5 + (currentLevel * 0.15);

        // Random direction changes occasionally
        if (Math.random() < 0.01) {
          obstacle.vx = (Math.random() - 0.5) * 3;
          obstacle.vy = (Math.random() - 0.5) * 3;
        }

        // Update position
        obstacle.x += obstacle.vx * obstacle.speed;
        obstacle.y += obstacle.vy * obstacle.speed;
        obstacle.rotation += obstacle.rotationSpeed;

        // Wrap around edges (whole map, not just playable area)
        if (obstacle.x < -obstacle.size) {
          obstacle.x = gameWidth + obstacle.size;
        } else if (obstacle.x > gameWidth + obstacle.size) {
          obstacle.x = -obstacle.size;
        }

        if (obstacle.y < -obstacle.size) {
          obstacle.y = gameHeight + obstacle.size;
        } else if (obstacle.y > gameHeight + obstacle.size) {
          obstacle.y = -obstacle.size;
        }

        // Collision with player
        const dx = (player.x + player.width / 2) - (obstacle.x);
        const dy = (player.y + player.height / 2) - (obstacle.y);
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < obstacle.size / 2 + 12) {
          respawnPlayer();
        }
      });
    }

        if (obstacle.type === 'lilypad') {

          ctx.lineWidth = 3;

          for (let i = 1; i <= 3; i++) {
            ctx.beginPath();
            ctx.ellipse(0, 0, obstacle.size * 0.3 * i, obstacle.size * 0.15 * i, 0, 0, Math.PI * 2);
            ctx.stroke();
          }

          // Moss on log
          ctx.fillStyle = 'rgba(45, 138, 77, 0.4)';
          ctx.beginPath();
          ctx.ellipse(-obstacle.size * 0.2, obstacle.size * 0.15, 15, 10, 0.3, 0, Math.PI * 2);
          ctx.fill();
        } else if (obstacle.type === 'rock') {
          // Draw large rock
          ctx.fillStyle = '#7a7a7a';
          ctx.beginPath();
          ctx.ellipse(0, 0, obstacle.size * 0.65, obstacle.size * 0.6, 0.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = '#5a5a5a';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Rock texture
          ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
          for (let i = 0; i < 5; i++) {
            const rx = (Math.random() - 0.5) * obstacle.size * 0.8;
            const ry = (Math.random() - 0.5) * obstacle.size * 0.8;
            const rsize = Math.random() * 8 + 3;
            ctx.beginPath();
            ctx.arc(rx, ry, rsize, 0, Math.PI * 2);
            ctx.fill();
          }

          // Rock highlight
          ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.beginPath();
          ctx.arc(-obstacle.size * 0.2, -obstacle.size * 0.2, 15, 0, Math.PI * 2);
          ctx.fill();
        } else if (obstacle.type === 'driftwood') {
          // Draw driftwood cluster
          ctx.fillStyle = '#9b8b6b';
          ctx.beginPath();
          ctx.ellipse(0, 0, obstacle.size * 0.7, obstacle.size * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = '#7b6b4b';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Driftwood branches sticking out
          ctx.strokeStyle = '#9b8b6b';
          ctx.lineWidth = 6;
          ctx.lineCap = 'round';
          for (let i = -1; i <= 1; i++) {
            ctx.beginPath();
            ctx.moveTo(obstacle.size * 0.2, i * 10);
            ctx.lineTo(obstacle.size * 0.5, i * 15);
            ctx.stroke();
          }

          // Barnacles/texture
          ctx.fillStyle = 'rgba(100, 100, 100, 0.6)';
          for (let i = 0; i < 6; i++) {
            const bx = (Math.random() - 0.5) * obstacle.size * 0.8;
            const by = (Math.random() - 0.5) * obstacle.size * 0.6;
            ctx.beginPath();
            ctx.arc(bx, by, 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.restore();
      });
    }

    let solvedPuzzles = {};

    function checkPuzzleInteraction() {
      const level = levels[currentLevel];
      for (let puzzle of level.puzzles) {
        const dx = (player.x + player.width / 2) - (puzzle.x || 0);
        const dy = (player.y + player.height / 2) - (puzzle.y || 0);
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < 60) {
          player.canInteract = true;
          player.interactTarget = puzzle;
          return;
        }
      }
      player.canInteract = false;
      player.interactTarget = null;
    }

    function interactWithPuzzle() {
      if (!player.interactTarget) return;

      const puzzle = player.interactTarget;
      const key = `${currentLevel}-${puzzle.x}-${puzzle.y}`;

      if (puzzle.type === 'wand') {
        player.abilities.dash = true;
        completeLevel();
      } else if (puzzle.type === 'goal') {
        completeLevel();
      } else if (puzzle.type === 'switch') {
        solvedPuzzles[key] = !solvedPuzzles[key];
        if (solvedPuzzles[key]) {
          const level = levels[currentLevel];
          level.puzzles.forEach(p => {
            if (p.id === puzzle.targetDoor) {
              p.isOpen = true;
            }
          });
        }
      } else if (puzzle.type === 'lightPuzzle') {
        player.abilities.glow = true;
        completeLevel();
      } else if (puzzle.type === 'boss') {
        if (player.abilities.stunEnemy && evilAxolotl.stunned) {
          completeLevel();
        }
      }
    }

    // ============================================
    // INPUT HANDLING
    // ============================================

    const keys = {};

    // ============================================
    // TOUCH/MOBILE INPUT
    // ============================================

    const touchControls = {
      leftPad: { x: 0, y: 0, radius: 50, active: false },
      rightPad: { x: 0, y: 0, radius: 50, active: false },
      dpadDirection: { x: 0, y: 0 }
    };

    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    function setupTouchControls() {
      if (!isMobile) return;

      const canvas = document.getElementById('mainCanvas');
      
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let touch of e.touches) {
          const rect = canvas.getBoundingClientRect();
          const x = touch.clientX - rect.left;
          const y = touch.clientY - rect.top;

          // Left side = movement
          if (x < gameWidth / 2) {
            touchControls.leftPad.active = true;
            touchControls.leftPad.x = x;
            touchControls.leftPad.y = y;
          }
          // Right side = abilities
          else {
            touchControls.rightPad.active = true;
            touchControls.rightPad.x = x;
            touchControls.rightPad.y = y;
          }
        }
      }, false);

      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (let touch of e.touches) {
          const rect = canvas.getBoundingClientRect();
          const x = touch.clientX - rect.left;
          const y = touch.clientY - rect.top;

          if (x < gameWidth / 2) {
            touchControls.leftPad.x = x;
            touchControls.leftPad.y = y;
          } else {
            touchControls.rightPad.x = x;
            touchControls.rightPad.y = y;
          }
        }
      }, false);

      canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (e.touches.length === 0) {
          touchControls.leftPad.active = false;
          touchControls.rightPad.active = false;
          touchControls.dpadDirection = { x: 0, y: 0 };
        }
      }, false);
    }

    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (player.canInteract) {
          interactWithPuzzle();
        } else if (player.abilities.stunEnemy && keys['shift']) {
          // Stun enemy
          if (player.dashCooldown <= 0) {
            evilAxolotl.stunned = true;
            evilAxolotl.stunnedDuration = 120;
            player.dashCooldown = 300;
          }
        }
      }

      if (e.key === 'Shift') {
        e.preventDefault();
        if (player.abilities.dash && player.dashCooldown <= 0) {
          const speed = Math.sqrt(player.vx ** 2 + player.vy ** 2);
          if (speed > 0) {
            player.vx = (player.vx / speed) * player.dashSpeed;
            player.vy = (player.vy / speed) * player.dashSpeed;
            player.dashDuration = 10;
            player.dashCooldown = 120;
          }
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function updatePlayerMovement() {
      let inputX = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
      let inputY = (keys['s'] ? 1 : 0) - (keys['w'] ? 1 : 0);

      // Mobile touch controls - left pad
      if (touchControls.leftPad.active) {
        const centerX = gameWidth / 4;
        const centerY = gameHeight / 2;
        const dx = touchControls.leftPad.x - centerX;
        const dy = touchControls.leftPad.y - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 15) {
          inputX = dx / dist;
          inputY = dy / dist;
        }
      }

      const magnitude = Math.sqrt(inputX ** 2 + inputY ** 2);
      if (magnitude > 0) {
        player.vx += (inputX / magnitude) * player.speed;
        player.vy += (inputY / magnitude) * player.speed;
      }
    }

    // ============================================
    // LEVEL MANAGEMENT
    // ============================================

    function loadLevel(levelIndex) {
      currentLevel = levelIndex;
      const level = levels[levelIndex];

      player.x = level.playerStart.x;
      player.y = level.playerStart.y;
      player.vx = 0;
      player.vy = 0;

      evilAxolotl.x = level.evilAxolotlStart.x;
      evilAxolotl.y = level.evilAxolotlStart.y;
      evilAxolotl.vx = 0;
      evilAxolotl.vy = 0;
      evilAxolotl.stunned = false;
      evilAxolotl.patrolTimer = 0;

      // Clear and spawn minions
      minions.length = 0;
      if (level.minions && level.minions > 0) {
        spawnMinions(level.minions, gameWidth / 2, gameHeight / 2);
      }

      // Create moving obstacles for boss level
      createMovingObstacles();

      solvedPuzzles = {};

      if (level.unlocksAbility) {
        player.abilities[level.unlocksAbility] = true;
      }

      gameState = 'playing';
      startTime = performance.now();
      speedrunTimer = 0;

      initializeEnvironmentDecor();
      updateAbilityUI();
      updateLevelInfo();
    }

    function completeLevel() {
      if (currentLevel < levels.length - 1) {
        currentLevel++;
        loadLevel(currentLevel);
      } else {
        gameState = 'gameWon';
        showWinModal();
      }
    }

    function respawnPlayer() {
      const level = levels[currentLevel];
      const checkpoint = level.checkpoints[level.checkpoints.length - 1];
      player.x = checkpoint.x;
      player.y = checkpoint.y;
      player.vx = 0;
      player.vy = 0;

      // Reset all enemies to their spawn positions
      evilAxolotl.x = level.evilAxolotlStart.x;
      evilAxolotl.y = level.evilAxolotlStart.y;
      evilAxolotl.vx = 0;
      evilAxolotl.vy = 0;
      evilAxolotl.stunned = false;
      evilAxolotl.patrolTimer = 0;

      // Reset all minions to their spawn positions
      minions.forEach(minion => {
        minion.x = minion.spawnX;
        minion.y = minion.spawnY;
        minion.vx = 0;
        minion.vy = 0;
        minion.patrolTimer = 0;
      });
    }

    // ============================================
    // UI UPDATES
    // ============================================

    function updateAbilityUI() {
      const abilitiesContainer = document.getElementById('abilitiesUI');
      abilitiesContainer.innerHTML = '';

      const abilities = [
        { key: 'dash', label: 'DASH', char: '⚡' },
        { key: 'glow', label: 'GLOW', char: '✨' },
        { key: 'stunEnemy', label: 'STUN', char: '⭐' }
      ];

      abilities.forEach((ability, index) => {
        const div = document.createElement('div');
        div.className = `ability-icon ${!player.abilities[ability.key] ? 'locked' : 'active'}`;
        div.innerHTML = `
          <div style="font-size: 20px;">${ability.char}</div>
          <div style="font-size: 10px;">${ability.label}</div>
        `;
        if (player.abilities[ability.key]) {
          const cooldownPct = Math.max(0, (1 - player.dashCooldown / 300) * 100);
          if (player.dashCooldown > 0) {
            const bar = document.createElement('div');
            bar.className = 'cooldown-bar';
            bar.style.width = cooldownPct + '%';
            div.appendChild(bar);
          }
        }
        abilitiesContainer.appendChild(div);
      });
    }

    function updateLevelInfo() {
      const level = levels[currentLevel];
      document.getElementById('levelInfo').textContent = `${currentLevel + 1}/${levels.length} - ${level.name}`;
    }

    function updateTimer() {
      speedrunTimer = Math.floor((performance.now() - startTime) / 1000);
      const minutes = Math.floor(speedrunTimer / 60);
      const seconds = speedrunTimer % 60;
      const timerElement = document.getElementById('timer');
      timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // ============================================
    // DRAWING
    // ============================================

    function drawLevel() {
      const level = levels[currentLevel];

      // Outer sand/grass area
      ctx.fillStyle = '#8b7355';
      ctx.fillRect(0, 0, gameWidth, gameHeight);

      // Light blue water/maze area
      ctx.fillStyle = '#4db8e8';
      ctx.fillRect(40, 40, gameWidth - 80, gameHeight - 80);

      // Background gradient in maze area
      const gradient = ctx.createLinearGradient(0, 0, 0, gameHeight);
      if (level.lighting === 'bright') {
        gradient.addColorStop(0, '#5ac8f0');
        gradient.addColorStop(1, '#3da8d8');
      } else if (level.lighting === 'dark') {
        gradient.addColorStop(0, '#3da8d8');
        gradient.addColorStop(1, '#2088b8');
      } else if (level.lighting === 'crystal') {
        gradient.addColorStop(0, '#5ac8f0');
        gradient.addColorStop(1, '#3da8d8');
      } else if (level.lighting === 'intense') {
        gradient.addColorStop(0, '#4db8e8');
        gradient.addColorStop(1, '#2088b8');
      }

      ctx.fillStyle = gradient;
      ctx.fillRect(40, 40, gameWidth - 80, gameHeight - 80);

      // Draw particles/bubbles
      drawBubbles();

      // Draw walls
      ctx.fillStyle = '#2a5a7a';
      ctx.strokeStyle = '#00d4ff';
      ctx.lineWidth = 2;
      level.walls.forEach(wall => {
        if (wall.x && wall.y && wall.width && wall.height) {
          ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
          ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
        }
      });

      // Draw puzzles
      level.puzzles.forEach(puzzle => {
        if (puzzle.type === 'wand') {
          drawWand(puzzle.x, puzzle.y);
        } else if (puzzle.type === 'goal') {
          drawGoal(puzzle.x, puzzle.y);
        } else if (puzzle.type === 'switch') {
          const key = `${currentLevel}-${puzzle.x}-${puzzle.y}`;
          drawSwitch(puzzle.x, puzzle.y, solvedPuzzles[key] || false);
        } else if (puzzle.type === 'door') {
          if (!puzzle.isOpen) {
            drawDoor(puzzle.x, puzzle.y, puzzle.width, puzzle.height);
          }
        } else if (puzzle.type === 'lightPuzzle') {
          drawLightPuzzle(puzzle.x, puzzle.y);
        } else if (puzzle.type === 'boss') {
          drawBossMarker(puzzle.x, puzzle.y);
        }
      });

      // Draw player
      player.draw(ctx);

      // Draw evil axolotl
      evilAxolotl.draw(ctx);

      // Draw glow effect from player if glow is unlocked
      if (player.glowRadius > 0) {
        const gradient = ctx.createRadialGradient(
          player.x + player.width / 2, player.y + player.height / 2, player.glowRadius / 2,
          player.x + player.width / 2, player.y + player.height / 2, player.glowRadius
        );
        gradient.addColorStop(0, 'rgba(0, 255, 136, 0.3)');
        gradient.addColorStop(1, 'rgba(0, 255, 136, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(player.x + player.width / 2, player.y + player.height / 2, player.glowRadius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawWand(x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(performance.now() / 1000);

      ctx.strokeStyle = '#ffdd00';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-15, 0);
      ctx.lineTo(15, 0);
      ctx.stroke();

      ctx.fillStyle = '#ffdd00';
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawGoal(x, y) {
      ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
      ctx.beginPath();
      ctx.arc(x, y, 40, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x, y, 40, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#00ff88';
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + performance.now() / 1000;
        const px = x + Math.cos(angle) * 50;
        const py = y + Math.sin(angle) * 50;
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSwitch(x, y, active) {
      ctx.fillStyle = active ? '#00ff88' : '#ff4444';
      ctx.fillRect(x - 15, y - 15, 30, 30);

      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 15, y - 15, 30, 30);

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(active ? '✓' : '✗', x, y);
    }

    function drawDoor(x, y, w, h) {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(x, y, w, h);

      ctx.strokeStyle = '#d4a574';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);

      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(x + w - 8, y + h / 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLightPuzzle(x, y) {
      ctx.fillStyle = 'rgba(0, 200, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(x, y, 50, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#00d4ff';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(x, y, 20 + i * 15, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawBossMarker(x, y) {
      ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(x, y, 60, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x, y, 60, 0, Math.PI * 2);
      ctx.stroke();
    }

    // ============================================
    // ENVIRONMENT DECOR
    // ============================================

    const environmentDecor = [];

    function initializeEnvironmentDecor() {
      environmentDecor.length = 0;
      
      // Add rocks scattered around (smaller and more detailed)
      for (let i = 0; i < 25; i++) {
        environmentDecor.push({
          type: 'rock',
          x: Math.random() * gameWidth,
          y: Math.random() * gameHeight,
          size: Math.random() * 8 + 4,
          color: `hsl(${Math.random() * 30 + 150}, 40%, 50%)`
        });
      }

      // Add seaweed clumps
      for (let i = 0; i < 12; i++) {
        environmentDecor.push({
          type: 'seaweed',
          x: Math.random() * gameWidth,
          y: Math.random() * gameHeight,
          height: Math.random() * 40 + 25,
          width: Math.random() * 6 + 3,
          wave: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.02 + 0.01
        });
      }

      // Add coral formations (smaller and more detailed)
      for (let i = 0; i < 18; i++) {
        environmentDecor.push({
          type: 'coral',
          x: Math.random() * gameWidth,
          y: Math.random() * gameHeight,
          size: Math.random() * 10 + 6,
          color: `hsl(${Math.random() * 60 + 0}, 70%, ${Math.random() * 30 + 40}%)`
        });
      }

      // Add ambient fish
      for (let i = 0; i < 8; i++) {
        environmentDecor.push({
          type: 'fish',
          x: Math.random() * gameWidth,
          y: Math.random() * gameHeight,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          size: Math.random() * 4 + 2,
          color: `hsl(${Math.random() * 360}, 60%, 50%)`
        });
      }
    }

    function updateEnvironmentDecor() {
      environmentDecor.forEach(decor => {
        if (decor.type === 'seaweed') {
          decor.wave += decor.speed;
        } else if (decor.type === 'fish') {
          decor.x += decor.vx;
          decor.y += decor.vy;

          // Bounce off walls
          if (decor.x < 0 || decor.x > gameWidth) decor.vx *= -1;
          if (decor.y < 0 || decor.y > gameHeight) decor.vy *= -1;

          // Keep in bounds
          decor.x = Math.max(0, Math.min(gameWidth, decor.x));
          decor.y = Math.max(0, Math.min(gameHeight, decor.y));

          // Occasionally change direction
          if (Math.random() < 0.01) {
            decor.vx = (Math.random() - 0.5) * 0.8;
            decor.vy = (Math.random() - 0.5) * 0.8;
          }
        }
      });
    }

    function drawEnvironmentDecor() {
      environmentDecor.forEach(decor => {
        if (decor.type === 'rock') {
          // Draw tiny detailed rocks with shading
          ctx.fillStyle = decor.color;
          ctx.beginPath();
          ctx.ellipse(decor.x, decor.y, decor.size, decor.size * 0.7, Math.random() * 0.5, 0, Math.PI * 2);
          ctx.fill();

          // Rock details
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
          ctx.lineWidth = 0.5;
          ctx.stroke();

          // Small highlight for detail
          ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
          ctx.beginPath();
          ctx.arc(decor.x - decor.size * 0.3, decor.y - decor.size * 0.2, decor.size * 0.2, 0, Math.PI * 2);
          ctx.fill();
        } else if (decor.type === 'seaweed') {
          // Draw seaweed waving with more detail
          ctx.strokeStyle = 'rgba(34, 139, 70, 0.6)';
          ctx.lineWidth = decor.width;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.beginPath();
          ctx.moveTo(decor.x, decor.y);

          let curX = decor.x;
          let curY = decor.y;
          const segments = 10;
          for (let i = 1; i <= segments; i++) {
            const progress = i / segments;
            curX = decor.x + Math.sin(decor.wave + i * 0.3) * 8;
            curY = decor.y + (decor.height * progress);
            ctx.lineTo(curX, curY);
          }
          ctx.stroke();

          // Seaweed leaf detail on second pass
          ctx.strokeStyle = 'rgba(34, 139, 70, 0.4)';
          ctx.lineWidth = decor.width * 0.6;
          for (let i = 1; i <= segments; i++) {
            const progress = i / segments;
            const angle = decor.wave + i * 0.3;
            const x = decor.x + Math.sin(angle) * 8;
            const y = decor.y + (decor.height * progress);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.cos(angle) * 4, y + 3);
            ctx.stroke();
          }
        } else if (decor.type === 'coral') {
          // Draw detailed coral with bumps
          ctx.fillStyle = decor.color;
          ctx.globalAlpha = 0.7;
          
          // Main body
          ctx.beginPath();
          ctx.arc(decor.x, decor.y, decor.size, 0, Math.PI * 2);
          ctx.fill();

          // Coral branch bumps for detail
          ctx.fillStyle = decor.color;
          for (let i = 0; i < 7; i++) {
            const angle = (i / 7) * Math.PI * 2;
            const px = decor.x + Math.cos(angle) * decor.size * 0.5;
            const py = decor.y + Math.sin(angle) * decor.size * 0.5;
            ctx.beginPath();
            ctx.arc(px, py, decor.size * 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Tiny bumps on coral
            const bumpSize = decor.size * 0.15;
            ctx.beginPath();
            ctx.arc(px + Math.cos(angle) * bumpSize, py + Math.sin(angle) * bumpSize, bumpSize, 0, Math.PI * 2);
            ctx.fill();
          }

          // Coral highlight
          ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.beginPath();
          ctx.arc(decor.x - decor.size * 0.3, decor.y - decor.size * 0.3, decor.size * 0.3, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.globalAlpha = 1.0;
        } else if (decor.type === 'fish') {
          // Draw small detailed ambient fish
          ctx.save();
          ctx.translate(decor.x, decor.y);

          // Determine direction
          const direction = decor.vx > 0 ? 1 : -1;
          if (direction < 0) ctx.scale(-1, 1);

          // Fish shadow for depth
          ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
          ctx.beginPath();
          ctx.ellipse(0.5, 0.5, decor.size * 0.9, decor.size * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();

          // Fish body with gradient-like effect
          ctx.fillStyle = decor.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, decor.size, decor.size * 0.6, 0, 0, Math.PI * 2);
          ctx.fill();

          // Fish belly lighter
          ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
          ctx.beginPath();
          ctx.ellipse(0, decor.size * 0.2, decor.size * 0.8, decor.size * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();

          // Fish tail with detail
          ctx.fillStyle = decor.color;
          ctx.beginPath();
          ctx.moveTo(decor.size, 0);
          ctx.lineTo(decor.size + decor.size * 0.8, -decor.size * 0.5);
          ctx.lineTo(decor.size + decor.size * 0.8, decor.size * 0.5);
          ctx.closePath();
          ctx.fill();

          // Tail fin lines
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(decor.size + decor.size * 0.3, -decor.size * 0.3);
          ctx.lineTo(decor.size + decor.size * 0.8, -decor.size * 0.5);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(decor.size + decor.size * 0.3, decor.size * 0.3);
          ctx.lineTo(decor.size + decor.size * 0.8, decor.size * 0.5);
          ctx.stroke();

          // Fish eye
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(-decor.size * 0.3, -decor.size * 0.1, 1.2, 0, Math.PI * 2);
          ctx.fill();

          // Eye pupil
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(-decor.size * 0.25, -decor.size * 0.1, 0.6, 0, Math.PI * 2);
          ctx.fill();

          // Fins detail
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(-decor.size * 0.2, -decor.size * 0.5);
          ctx.lineTo(-decor.size * 0.3, -decor.size * 0.9);
          ctx.stroke();

          ctx.restore();
        }
      });
    }

    const bubbles = [];

    function drawBubbles() {
      if (Math.random() < 0.1) {
        bubbles.push({
          x: Math.random() * gameWidth,
          y: gameHeight,
          radius: Math.random() * 3 + 1,
          speed: Math.random() * 1 + 0.5,
          opacity: 0.4
        });
      }

      bubbles.forEach((bubble, i) => {
        bubble.y -= bubble.speed;
        bubble.opacity -= 0.01;

        if (bubble.opacity <= 0 || bubble.y < 0) {
          bubbles.splice(i, 1);
          return;
        }

        ctx.fillStyle = `rgba(100, 200, 255, ${bubble.opacity})`;
        ctx.beginPath();
        ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawTouchUI() {
      if (!isMobile || !touchControls.leftPad.active) return;

      // Left pad (movement)
      const leftCenterX = gameWidth / 4;
      const leftCenterY = gameHeight / 2;
      
      ctx.fillStyle = 'rgba(0, 212, 255, 0.15)';
      ctx.beginPath();
      ctx.arc(leftCenterX, leftCenterY, 50, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(0, 212, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(leftCenterX, leftCenterY, 50, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = 'rgba(0, 255, 136, 0.6)';
      ctx.beginPath();
      ctx.arc(touchControls.leftPad.x, touchControls.leftPad.y, 25, 0, Math.PI * 2);
      ctx.fill();

      // Right pad (abilities) - show if active
      if (touchControls.rightPad.active) {
        const rightCenterX = gameWidth * 0.75;
        const rightCenterY = gameHeight / 2;
        
        ctx.fillStyle = 'rgba(255, 170, 0, 0.15)';
        ctx.beginPath();
        ctx.arc(rightCenterX, rightCenterY, 50, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 170, 0, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(rightCenterX, rightCenterY, 50, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = 'rgba(255, 221, 0, 0.8)';
        ctx.beginPath();
        ctx.arc(touchControls.rightPad.x, touchControls.rightPad.y, 25, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawMinimap() {
      const scale = 0.15;
      minimapCtx.fillStyle = '#030a15';
      minimapCtx.fillRect(0, 0, 120, 120);

      minimapCtx.strokeStyle = '#00d4ff';
      minimapCtx.lineWidth = 1;

      const level = levels[currentLevel];
      level.walls.forEach(wall => {
        minimapCtx.fillStyle = '#2a5a7a';
        minimapCtx.fillRect(wall.x * scale, wall.y * scale, wall.width * scale, wall.height * scale);
      });

      minimapCtx.fillStyle = '#ff6b9d';
      minimapCtx.beginPath();
      minimapCtx.arc(player.x * scale, player.y * scale, 3, 0, Math.PI * 2);
      minimapCtx.fill();

      minimapCtx.fillStyle = '#4a0080';
      minimapCtx.beginPath();
      minimapCtx.arc(evilAxolotl.x * scale, evilAxolotl.y * scale, 3, 0, Math.PI * 2);
      minimapCtx.fill();

      level.puzzles.forEach(puzzle => {
        if (puzzle.type === 'goal') {
          minimapCtx.fillStyle = '#00ff88';
          minimapCtx.beginPath();
          minimapCtx.arc((puzzle.x || 0) * scale, (puzzle.y || 0) * scale, 2, 0, Math.PI * 2);
          minimapCtx.fill();
        }
      });

      minimapCtx.strokeStyle = '#00d4ff';
      minimapCtx.lineWidth = 1;
      minimapCtx.strokeRect(0, 0, 120, 120);
    }

    // ============================================
    // MODALS
    // ============================================

    function showIntroModal() {
      const html = `
        <div class="modal" id="introModal">
          <div class="modal-content">
            <div class="modal-title">🐟 Axolotl Escape 🐟</div>
            <div class="modal-text">
              You were exploring a magical pond when a powerful evil axolotl appeared and transformed you!<br><br>
              Now you must escape through the underwater maze, recover the magical wand, and defeat the evil axolotl to return to your human form.<br><br>
              <strong>Use WASD to move, SPACE to interact, SHIFT to dash!</strong>
            </div>
            <div class="modal-buttons">
              <button class="modal-button" onclick="startGame()">Begin Adventure</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('gameCanvas').insertAdjacentHTML('beforeend', html);
    }

    function startGame() {
      const modal = document.getElementById('introModal');
      if (modal) modal.remove();
      loadLevel(0);
    }

    function showWinModal() {
      const html = `
        <div class="modal" id="winModal">
          <div class="modal-content">
            <div class="modal-title">🎉 YOU ESCAPED! 🎉</div>
            <div class="modal-text">
              You've defeated the evil axolotl and recovered your human form!<br><br>
              Final Time: ${Math.floor(speedrunTimer / 60).toString().padStart(2, '0')}:${(speedrunTimer % 60).toString().padStart(2, '0')}<br><br>
              <strong>Well done, brave adventurer!</strong>
            </div>
            <div class="modal-buttons">
              <button class="modal-button" onclick="location.reload()">Play Again</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('gameCanvas').insertAdjacentHTML('beforeend', html);
    }

    // ============================================
    // GAME LOOP
    // ============================================

    function gameLoop() {
      updatePlayerMovement();
      player.update();
      evilAxolotl.update();
      updateMinions();
      updateMovingObstacles();
      updateEnvironmentDecor();
      checkPuzzleInteraction();

      // Update interaction prompt
      const prompt = document.getElementById('interactionPrompt');
      if (player.canInteract && player.interactTarget) {
        let text = 'Press SPACE';
        if (player.interactTarget.type === 'goal') text = 'PRESS SPACE TO EXIT';
        if (player.interactTarget.type === 'wand') text = 'PRESS SPACE TO TAKE WAND';
        if (player.interactTarget.type === 'switch') text = 'PRESS SPACE TO TOGGLE';

        prompt.textContent = text;
        prompt.classList.remove('hidden');
      } else {
        prompt.classList.add('hidden');
      }

      drawLevel();
      drawEnvironmentDecor();
      drawMovingObstacles();
      drawMinions();
      drawTouchUI();
      drawMinimap();
      updateAbilityUI();
      updateTimer();

      requestAnimationFrame(gameLoop);
    }

    // ============================================
    // INITIALIZATION
    // ============================================

    setupTouchControls();
    showIntroModal();
    gameLoop();
  </script>
